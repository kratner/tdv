<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trans-Dimensional Voyager - An interactive slide viewer">
    <title>Trans-Dimensional Voyager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="viewer-container">
        <!-- Header -->
        <header class="header">
            <h1>Trans-Dimensional Voyager</h1>
            <div class="slide-counter">
                <span class="current-slide">1</span> / <span class="total-slides">15</span>
            </div>
        </header>

        <!-- Main Slide Viewer -->
        <main class="slide-viewer">
            <button class="nav-btn prev-btn" aria-label="Previous slide">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            
            <div class="slide-container">
                <img class="slide-image" src="" alt="Slide" loading="lazy">
            </div>
            
            <button class="nav-btn next-btn" aria-label="Next slide">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </main>

        <!-- Controls -->
        <div class="controls">
            <button class="control-btn fullscreen-btn" aria-label="Toggle fullscreen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>
            <button class="control-btn autoplay-btn" aria-label="Toggle autoplay">
                <svg class="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg class="pause-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
        </div>

        <!-- Thumbnail Navigation -->
        <nav class="thumbnail-nav">
            <div class="thumbnail-container">
                <!-- Thumbnails will be generated by JavaScript -->
            </div>
        </nav>

        <!-- Help Overlay -->
        <div class="help-overlay">
            <div class="help-text">
                <kbd>←</kbd> <kbd>→</kbd> Navigate | <kbd>F</kbd> Fullscreen | <kbd>Space</kbd> Autoplay
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
